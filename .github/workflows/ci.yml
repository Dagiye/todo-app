name: Todo App CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:

  frontend-lint:
    name: Frontend Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm install

      - name: Run frontend lint
        working-directory: frontend
        run: npm run lint 
      - name: Run frontend tests
        working-directory: frontend
        run: npm run test


  backend-lint:
    name: Backend Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install backend dependencies
        working-directory: backend
        run: npm install

      - name: Run backend lint
        working-directory: backend
        run: npm run lint

      - name: Run backend tests
        working-directory: backend
        run: npm run test
  docker-build-push:
    name: Docker Build and Push
    needs: [frontend-lint, backend-lint]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build and push Frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          build-args: |
            VITE_API_URL=${{ secrets.VITE_API_URL }}
          tags: |
             ${{ secrets.DOCKER_USERNAME }}/todo-frontend:${{ github.sha }}
             ${{ secrets.DOCKER_USERNAME }}/todo-frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Build and push Backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: |
             ${{ secrets.DOCKER_USERNAME }}/todo-backend:${{ github.sha }}
             ${{ secrets.DOCKER_USERNAME }}/todo-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
  deploy-render:
    name: Deploy to Render
    needs: docker-build-push
    runs-on: ubuntu-latest

    steps:
      - name: Trigger Backend Deployment
        run: |
          curl -X POST ${{ secrets.BACKEND_RENDER_DEPLOY_HOOK }}
      - name: Trigger Frontend Deployment
        run: |
          curl -X POST ${{ secrets.FRONTEND_RENDER_DEPLOY_HOOK }}